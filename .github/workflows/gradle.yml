name: kursovaya

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  mysql:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Start MySQL
        run: docker compose up -d mysql

      - name: Waiting for container start
      - run: sleep 30

      - name: Start app
        run: |
          java -Ddb.url=jdbc:mysql://localhost:3306/aqashop \
               -Ddb.user=test \
               -Ddb.password=test \
               -jar aqa-shop.jar &

      - name: Run tests
        run: |
          chmod +x gradlew
          ./gradlew test \
            -Dselenide.headless=true \
            -Ddb.url=jdbc:mysql://localhost:3306/aqashop \
            -Ddb.user=test \
            -Ddb.password=test

  postgres:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Start PostgreSQL
        run: docker compose up -d postgres

      - name: Waiting for container start
      - run: sleep 30

      - name: Start app
        run: |
          java -Ddb.url=jdbc:postgresql://localhost:5432/aqashop \
               -Ddb.user=test \
               -Ddb.password=test \
               -jar aqa-shop.jar &

      - name: Run tests
        run: |
          chmod +x gradlew
          ./gradlew test \
            -Dselenide.headless=true \
            -Ddb.url=jdbc:postgresql://localhost:5432/aqashop \
            -Ddb.user=test \
            -Ddb.password=test