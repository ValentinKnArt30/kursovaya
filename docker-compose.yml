services:

  mysql:
    image: mysql:8.0.41
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aqashop
      MYSQL_USER: test
      MYSQL_PASSWORD: test

  postgres:
    image: postgres:15
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aqashop
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test